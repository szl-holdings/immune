name: CI

# Minimal, honest quality gate for the IMMUNE demo artifact. The frontend is a
# slice of a pnpm-catalog monorepo (deps use `catalog:` / `workspace:*`), so it
# is not independently installable or buildable in isolation here. The
# dependency-free Foundations honesty guard is the real gate: it proves every
# served formula traces verbatim to a committed corpus snapshot, and self-tests
# that the guard rejects a fabricated anchor. Actions are SHA-pinned.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  foundations-guard:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.1.7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # actions/setup-node@v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
      - name: Foundations honesty guard (dependency-free)
        working-directory: frontend
        run: node scripts/check-foundations-corpus.mjs
